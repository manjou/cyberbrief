name: Daily briefing

on:
  schedule:
    - cron: "30 5 * * *"   # 05:30 UTC every day
  workflow_dispatch: {}     # manual run button

permissions:
  contents: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate briefing
        env:
          # Optional: add ANTHROPIC_API_KEY as a repo secret for AI explanations
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m cyberbrief --out docs

      - name: Commit and push
        run: |
          git config user.name "cyberbrief-bot"
          git config user.email "actions@github.com"
          git add docs
          git diff --cached --quiet || git commit -m "briefing: $(date -u +%F)"
          git push
